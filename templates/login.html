<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Report Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --border: #30363d; --accent: #2d7dd2; --accent-glow: rgba(45,125,210,.25);
    --danger: #f85149; --text: #e6edf3; --text-muted: #8b949e;
  }
  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,58,95,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,95,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), #1a5fa8);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 20px;
    box-shadow: 0 0 30px var(--accent-glow);
  }
  h1 { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 6px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  .error-msg {
    background: rgba(248,81,73,.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 20px;
    text-align: center;
  }
  button {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--accent), #1a5fa8);
    border: none; border-radius: 8px;
    color: #fff;
    font-family: 'Onest', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  button:hover { opacity: .9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📊</div>
  <h1>Report Generator</h1>
  <p class="sub">Введите данные для входа</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Логин</label>
      <input type="text" name="username" autofocus autocomplete="username" required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
